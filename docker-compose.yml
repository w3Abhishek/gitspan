services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./backend:/app

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gitspan
      POSTGRES_USER: gitspan
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gitspan}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
